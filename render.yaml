services:
  # API Server
  - type: web
    name: sberpos-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python api_server.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        value: 5001
      - key: DATABASE_URL
        value: postgresql://sberpos_db_user:AGaMfeza90tWL1CCycxOMLaIdY1KmhZ4@dpg-d76qp6oule4c73945opg-a/sberpos_db
    
  # Telegram Bot (Terminal Management)
  - type: worker
    name: sberpos-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: BOT_TOKEN
        sync: false
      - key: BASE_URL
        value: https://sberpos-api.onrender.com
  
  # Support Bot (Customer Support)
  - type: worker
    name: sberpos-support-bot
    env: python
    buildCommand: pip install -r support_requirements.txt
    startCommand: python support_bot.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SUPPORT_BOT_TOKEN
        sync: false
      - key: ADMIN_USER_ID
        sync: false
