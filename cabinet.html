<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>СберЭкран</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --green: #21A038;
            --green-light: #E8F5EC;
            --green-glow: rgba(33,160,56,0.18);
            --red: #E5383B;
            --red-light: #FDECEA;
            --yellow: #F5A623;
            --yellow-light: #FEF6E7;
            --blue: #1346A3;
            --bg: #F2F4F7;
            --card: #FFFFFF;
            --text: #1A1A2E;
            --muted: #6B7280;
            --border: #E5E7EB;
            --radius: 24px;
            --shadow: 0 8px 40px rgba(0,0,0,0.10), 0 1.5px 4px rgba(0,0,0,0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Manrope', -apple-system, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        /* Subtle background pattern */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 10% 0%, rgba(33,160,56,0.07) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 90% 100%, rgba(19,70,163,0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 48px 40px 40px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: var(--shadow);
            position: relative;
            z-index: 1;
            animation: fadeUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(28px) scale(0.98); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Sber logo strip at top */
        .sber-bar {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 5px;
            border-radius: var(--radius) var(--radius) 0 0;
            background: linear-gradient(90deg, #21A038 0%, #2DC653 100%);
        }

        /* Icon bubble */
        .icon-wrap {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 28px;
        }
        .icon-wrap.red   { background: var(--red-light); }
        .icon-wrap.yellow{ background: var(--yellow-light); }
        .icon-wrap.green { background: var(--green-light); }
        .icon-wrap.blue  { background: #EEF2FB; }

        .icon-wrap svg {
            animation: iconPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
        }
        @keyframes iconPop {
            from { transform: scale(0.4); opacity: 0; }
            to   { transform: scale(1);   opacity: 1; }
        }

        h1 {
            font-size: 22px;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 12px;
            letter-spacing: -0.3px;
            line-height: 1.25;
        }

        p {
            color: var(--muted);
            font-size: 15px;
            line-height: 1.65;
            font-weight: 500;
        }

        /* Terminal ID badge */
        .tid {
            display: inline-block;
            background: #F3F4F6;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 2px 10px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: var(--text);
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-top: 16px;
        }

        /* Action button */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 28px;
            padding: 13px 28px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 700;
            font-family: 'Manrope', sans-serif;
            cursor: pointer;
            border: none;
            text-decoration: none;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .btn-green {
            background: linear-gradient(135deg, #21A038, #2DC653);
            color: white;
            box-shadow: 0 4px 16px rgba(33,160,56,0.30);
        }
        .btn-green:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(33,160,56,0.35); }
        .btn-green:active { transform: translateY(0); }

        /* Divider */
        .divider {
            height: 1px;
            background: var(--border);
            margin: 24px 0;
        }

        /* Sber logo at bottom */
        .sber-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 28px;
            opacity: 0.45;
        }
        .sber-logo span {
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: 0.3px;
        }

        /* Demo switcher — only for preview, remove in prod */
        .demo-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(12px);
            padding: 10px 14px;
            border-radius: 100px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
            z-index: 100;
        }
        .demo-btn {
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 700;
            font-family: 'Manrope', sans-serif;
            cursor: pointer;
            border: none;
            background: var(--border);
            color: var(--text);
            transition: background 0.15s, color 0.15s;
        }
        .demo-btn.active, .demo-btn:hover {
            background: var(--green);
            color: white;
        }
    </style>
</head>
<body>

    <!-- CARD — state changes via JS for demo. In Flask, render only the relevant block -->
    <div class="card" id="card">
        <div class="sber-bar"></div>
        <!-- Content injected by showState() -->
    </div>

    <!-- Demo switcher (remove in production Flask templates) -->
    <div class="demo-bar">
        <button class="demo-btn active" onclick="showState('no_terminal')">Нет терминала</button>
        <button class="demo-btn" onclick="showState('no_payment')">Нет оплаты</button>
        <button class="demo-btn" onclick="showState('bad_key')">Неверный ключ</button>
        <button class="demo-btn" onclick="showState('pay')">Оплата</button>
    </div>

    <script>
        const TERMINAL_ID = 'TRM-4821'; // в Flask: {{ terminal_id }}

        const states = {
            no_terminal: {
                iconClass: 'red',
                icon: `<svg width="42" height="42" viewBox="0 0 42 42" fill="none">
                    <circle cx="21" cy="21" r="21" fill="#E5383B" fill-opacity="0"/>
                    <path d="M13 13L29 29M29 13L13 29" stroke="#E5383B" stroke-width="3.5" stroke-linecap="round"/>
                </svg>`,
                title: 'Терминал не найден',
                body: `Терминал с идентификатором`,
                badge: true,
                sub: 'не зарегистрирован в системе. Проверьте QR-код или обратитесь к кассиру.',
                btn: null
            },
            no_payment: {
                iconClass: 'yellow',
                icon: `<svg width="44" height="44" viewBox="0 0 44 44" fill="none">
                    <circle cx="22" cy="22" r="19" stroke="#F5A623" stroke-width="3"/>
                    <path d="M22 12V24" stroke="#F5A623" stroke-width="3.5" stroke-linecap="round"/>
                    <circle cx="22" cy="31" r="2" fill="#F5A623"/>
                </svg>`,
                title: 'Нет активной оплаты',
                body: 'Оплата на терминале',
                badge: true,
                sub: 'сейчас не активна. Вернитесь к кассе и запустите оплату заново.',
                btn: null
            },
            bad_key: {
                iconClass: 'red',
                icon: `<svg width="42" height="42" viewBox="0 0 42 42" fill="none">
                    <rect x="8" y="19" width="26" height="18" rx="4" stroke="#E5383B" stroke-width="3"/>
                    <path d="M14 19V14a8 8 0 0116 0v5" stroke="#E5383B" stroke-width="3" stroke-linecap="round"/>
                    <circle cx="21" cy="28" r="2.5" fill="#E5383B"/>
                    <path d="M21 30.5V33" stroke="#E5383B" stroke-width="2.5" stroke-linecap="round"/>
                </svg>`,
                title: 'QR-код недействителен',
                body: 'Этот QR-код устарел или был использован ранее.',
                badge: false,
                sub: 'Отсканируйте новый QR-код с экрана терминала.',
                btn: null
            },
            pay: {
                iconClass: 'green',
                icon: `<svg width="46" height="46" viewBox="0 0 46 46" fill="none">
                    <rect x="4" y="10" width="38" height="26" rx="6" stroke="#21A038" stroke-width="3"/>
                    <path d="M4 18H42" stroke="#21A038" stroke-width="3"/>
                    <rect x="10" y="25" width="10" height="4" rx="2" fill="#21A038"/>
                    <rect x="26" y="25" width="10" height="4" rx="2" fill="#21A038" fill-opacity="0.4"/>
                </svg>`,
                title: 'Подтвердите оплату',
                body: 'Терминал ожидает подтверждения платежа.',
                badge: false,
                sub: 'Нажмите кнопку ниже для оплаты через СберПей.',
                btn: { label: 'Оплатить через СберПей', href: '#' }
            }
        };

        function showState(key) {
            const s = states[key];
            const card = document.getElementById('card');

            const badgeLine = s.badge
                ? `<p style="margin-top:8px">${s.body} <span class="tid">${TERMINAL_ID}</span><br><span style="display:block;margin-top:8px">${s.sub}</span></p>`
                : `<p>${s.body}<br>${s.sub}</p>`;

            const btnHtml = s.btn
                ? `<a href="${s.btn.href}" class="btn btn-green">
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                      <path d="M9 2L16 9L9 16M2 9h14" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    ${s.btn.label}
                   </a>`
                : '';

            card.innerHTML = `
                <div class="sber-bar"></div>
                <div class="icon-wrap ${s.iconClass}">${s.icon}</div>
                <h1>${s.title}</h1>
                ${badgeLine}
                ${btnHtml}
                <div class="sber-logo">
                    <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
                        <circle cx="11" cy="11" r="11" fill="#21A038"/>
                        <path d="M6 11.5C6 8.462 8.462 6 11.5 6a5.47 5.47 0 013.88 1.607l1.39-1.39A7.47 7.47 0 0011.5 4C7.358 4 4 7.358 4 11.5S7.358 19 11.5 19c3.166 0 5.88-1.963 7.037-4.768H16.2A5.504 5.504 0 0111.5 17C8.462 17 6 14.538 6 11.5z" fill="white"/>
                    </svg>
                    <span>СберЭкран</span>
                </div>
            `;

            // Перезапускаем анимацию
            card.style.animation = 'none';
            card.offsetHeight; // reflow
            card.style.animation = '';

            // Активная кнопка в демо-баре
            document.querySelectorAll('.demo-btn').forEach(b => b.classList.remove('active'));
            event?.target?.classList.add('active');
        }

        // Инит
        showState('no_terminal');
    </script>

</body>
</html>
